<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
<defs>
<filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0B1220" flood-opacity=".13"/></filter>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
</defs>
<rect width="1100" height="620" rx="28" fill="#F8FAFC"/>
<text x="550" y="48" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="28" font-weight="700" fill="#172033">Policy gate decision model</text>
<text x="550" y="78" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="15" font-weight="400" fill="#526078">Release is blocked only by configured high-impact conditions; residual non-blocking findings remain documented.</text>
<rect x="90" y="145" width="250" height="100" rx="22" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
<text x="215" y="180" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="18" font-weight="700" fill="#172033">JSON scan reports</text>
<text x="215" y="208" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="400" fill="#526078">Semgrep, Bandit, SCA, IaC, SBOM</text>
<path d="M340 195 L445 195" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="445" y="125" width="250" height="140" rx="22" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
<text x="570" y="160" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="18" font-weight="700" fill="#172033">Gate rules</text>
<text x="570" y="190" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="400" fill="#526078">ERROR/HIGH/CRITICAL</text>
<text x="570" y="218" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="400" fill="#526078">secret leaks, public ingress</text>
<path d="M695 195 L790 195" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="790" y="125" width="230" height="140" rx="22" fill="#ECFDF5" stroke="#86EFAC" filter="url(#shadow)"/>
<text x="905" y="160" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="18" font-weight="700" fill="#14532D">Fixed branch</text>
<text x="905" y="190" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="700" fill="#14532D">POLICY_GATE_STATUS=PASSED</text>
<text x="905" y="218" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="400" fill="#14532D">Release candidate accepted</text>
<rect x="235" y="350" width="270" height="125" rx="22" fill="#FEF2F2" stroke="#FECACA" filter="url(#shadow)"/>
<text x="370" y="385" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="18" font-weight="700" fill="#7F1D1D">Vulnerable baseline</text>
<text x="370" y="415" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="400" fill="#7F1D1D">10 Semgrep, 7 Bandit, 2 secrets</text>
<text x="370" y="443" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="700" fill="#7F1D1D">POLICY_GATE_STATUS=FAILED</text>
<rect x="595" y="350" width="270" height="125" rx="22" fill="#EFF6FF" stroke="#BFDBFE" filter="url(#shadow)"/>
<text x="730" y="385" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">Residual accepted risk</text>
<text x="730" y="415" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="400" fill="#1E3A8A">4 dependency CVEs, 1 Checkov info</text>
<text x="730" y="443" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="700" fill="#1E3A8A">No HIGH/CRITICAL blockers</text>
<path d="M530 265 C500 315 445 335 405 350" stroke="#475569" stroke-width="3" stroke-dasharray="7 7" fill="none" marker-end="url(#arrow)"/>
<path d="M630 265 C660 315 700 335 725 350" stroke="#475569" stroke-width="3" stroke-dasharray="7 7" fill="none" marker-end="url(#arrow)"/>
</svg>