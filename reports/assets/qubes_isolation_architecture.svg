<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#F8FBFF"/><stop offset="100%" stop-color="#EEF4FF"/></linearGradient>
  <linearGradient id="blue" x1="0" x2="1"><stop offset="0%" stop-color="#1F6FEB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0B1220" flood-opacity=".15"/></filter>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#526078"/></marker>
</defs>
<rect x="0" y="0" width="1100" height="620" rx="28" fill="url(#bg)"/>
<text x="550" y="55" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="28" font-weight="700" fill="#172033">Qubes OS isolation model for the DevSecOps lab</text>
<text x="550" y="88" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="15" font-weight="400" fill="#526078">Development, scanning and evidence transfer are split into separate trust zones</text>
<rect x="70" y="145" width="270" height="300" rx="24" fill="#FFFFFF" filter="url(#shadow)" stroke="#D8E2F0"/>
<rect x="415" y="145" width="270" height="300" rx="24" fill="#FFFFFF" filter="url(#shadow)" stroke="#D8E2F0"/>
<rect x="760" y="145" width="270" height="300" rx="24" fill="#FFFFFF" filter="url(#shadow)" stroke="#D8E2F0"/>
<rect x="95" y="175" width="220" height="48" rx="14" fill="#EAF2FF"/><text x="205" y="207" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="20" font-weight="700" fill="#1F3A68">dev-workbench</text>
<rect x="440" y="175" width="220" height="48" rx="14" fill="#FFF4E5"/><text x="550" y="207" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="20" font-weight="700" fill="#7A4B00">security-runner</text>
<rect x="785" y="175" width="220" height="48" rx="14" fill="#EDFDF2"/><text x="895" y="207" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="20" font-weight="700" fill="#155E2D">GitHub / public repo</text>
<text x="205" y="258" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="16" font-weight="700" fill="#172033">Project authoring</text>
<text x="205" y="288" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">README, docs, reports</text>
<text x="205" y="316" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">fixed/vulnerable branches</text>
<text x="205" y="344" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">final evidence pack</text>
<text x="550" y="258" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="16" font-weight="700" fill="#172033">Tool execution zone</text>
<text x="550" y="288" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">Semgrep, Bandit, Gitleaks</text>
<text x="550" y="316" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">Checkov, Trivy, Grype, Syft</text>
<text x="550" y="344" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">JSON/SBOM outputs only</text>
<text x="895" y="258" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="16" font-weight="700" fill="#172033">Publication zone</text>
<text x="895" y="288" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">reviewable evidence</text>
<text x="895" y="316" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">PDF/HTML report</text>
<text x="895" y="344" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="14" font-weight="400" fill="#526078">release tags</text>
<path d="M340 285 C370 285 385 285 415 285" stroke="#526078" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M685 285 C720 285 730 285 760 285" stroke="#526078" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<path d="M760 385 C650 515 455 515 340 385" stroke="#526078" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)"/>
<text x="377" y="270" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="700" fill="#526078">qvm-copy snapshot</text>
<text x="722" y="270" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="13" font-weight="700" fill="#526078">curated artifacts</text>
<text x="550" y="535" text-anchor="middle" font-family="Inter,DejaVu Sans,Arial,sans-serif" font-size="16" font-weight="700" fill="#172033">No shared clipboard trust is assumed: artifacts are copied intentionally and then validated.</text>
</svg>